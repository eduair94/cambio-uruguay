name: Secret scan

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      # Pinned actions/checkout v4. The GitHub token is not persisted in the
      # checkout, and this workflow receives no repository secrets.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject tracked credential files
        shell: bash
        run: |
          set -euo pipefail
          blocked="$(
            git ls-files | grep -Ei \
              '(^|/)(\.env($|\.(local|production|prod|staging|development))|\.npmrc$|\.pypirc$|\.netrc$|id_(rsa|ed25519)$|.*\.(pem|p12|pfx|key)$|serviceAccount\.json$|sheet_key\.json$|.*credentials.*\.json$|.*session.*\.json$)' \
              || true
          )"
          if [[ -n "$blocked" ]]; then
            printf '%s\n' "Tracked credential-like files are forbidden:" >&2
            printf '%s\n' "$blocked" >&2
            exit 1
          fi

      - name: Install checksum-pinned Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$url" --output "$RUNNER_TEMP/$archive"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$RUNNER_TEMP/$archive" | sha256sum --check
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/gitleaks" gitleaks
          printf '%s\n' "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Scan current tracked tree
        shell: bash
        run: |
          set -euo pipefail
          gitleaks dir . \
            --redact=100 \
            --no-banner \
            --no-color \
            --max-decode-depth=2 \
            --max-archive-depth=2

      - name: Scan every commit introduced by this event
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]] && [[ -n "$BASE_SHA" ]]; then
            log_range="${BASE_SHA}..${CURRENT_SHA}"
          elif [[ "$EVENT_NAME" == "push" ]] &&
               [[ -n "$BEFORE_SHA" ]] &&
               [[ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            log_range="${BEFORE_SHA}..${CURRENT_SHA}"
          else
            log_range="-1 ${CURRENT_SHA}"
          fi
          gitleaks git . \
            --log-opts="$log_range" \
            --redact=100 \
            --no-banner \
            --no-color \
            --max-decode-depth=2 \
            --max-archive-depth=2
